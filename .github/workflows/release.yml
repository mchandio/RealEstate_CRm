name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_platform:
        description: 'Target platform (all, windows, linux, macos)'
        required: false
        default: 'all'

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: 'RealEstateCRM'

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      
      - name: Lint with flake8
        run: |
          flake8 backend/ crm_core/ CRM/ --max-line-length=100 --ignore=E501,W503,E402 || true
      
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short || true

  # ── Windows Build ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: test
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.build_platform == 'all' || inputs.build_platform == 'windows'))
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Windows executable
        run: |
          pyinstaller RealEstateCRM_Qt_Release.spec --noconfirm
      
      - name: Create Windows installer
        run: |
          # Install Inno Setup
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ github.ref_name || '3.0.0' }} RealEstateCRM_Setup_Professional.iss
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/RealEstateCRM_Qt/
            installer_output/*.exe
          retention-days: 30

  # ── Linux Build ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.build_platform == 'all' || inputs.build_platform == 'linux'))
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-glx \
            libglib2.0-0 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libegl1 \
            libfuse2
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Linux executable
        run: |
          pyinstaller RealEstateCRM_Linux.spec --noconfirm
      
      - name: Create AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          
          cp -r dist/RealEstateCRM/* AppDir/usr/bin/
          
          cat > AppDir/RealEstateCRM.desktop << EOF
          [Desktop Entry]
          Type=Application
          Name=Real Estate CRM
          Exec=RealEstateCRM
          Icon=RealEstateCRM
          Categories=Office;Business;
          Comment=Professional Real Estate CRM System
          EOF
          
          cat > AppDir/AppRun << EOF
          #!/bin/bash
          APPDIR=\$(dirname "\$(readlink -f "\$0")")
          exec "\$APPDIR/usr/bin/RealEstateCRM" "\$@"
          EOF
          chmod +x AppDir/AppRun
          
          # Copy icon
          cp company_logo/RealEstateCRM_logo.png AppDir/usr/share/icons/hicolor/256x256/apps/RealEstateCRM.png || true
          
          # Build AppImage
          ./appimagetool AppDir RealEstateCRM-x86_64.AppImage
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/RealEstateCRM/
            RealEstateCRM-x86_64.AppImage
          retention-days: 30

  # ── macOS Build ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: test
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.build_platform == 'all' || inputs.build_platform == 'macos'))
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build macOS application
        run: |
          pyinstaller RealEstateCRM_macOS.spec --noconfirm
      
      - name: Create DMG
        run: |
          hdiutil create -volname "Real Estate CRM" -srcfolder dist/RealEstateCRM.app -ov -format UDZO "RealEstateCRM.dmg"
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/RealEstateCRM.app/
            RealEstateCRM.dmg
          retention-days: 30

  # ── Web/PWA Build ───────────────────────────────────────────────────────────
  build-web:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Prepare web distribution
        run: |
          mkdir -p dist/web
          cp -r frontend/* dist/web/
          cp -r backend dist/web/
          cp backend/main.py dist/web/
          cp requirements.txt dist/web/
          
          # Create web startup script
          cat > dist/web/start.sh << 'EOF'
          #!/bin/bash
          pip install -r requirements.txt
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 6090
          EOF
          chmod +x dist/web/start.sh
      
      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/web/
          retention-days: 30

  # ── Create Release ──────────────────────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            windows-build/**/*
            linux-build/RealEstateCRM-x86_64.AppImage
            linux-build/dist/RealEstateCRM/**
            macos-build/RealEstateCRM.dmg
            macos-build/dist/RealEstateCRM.app/**
            web-build/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Deploy PWA to GitHub Pages ──────────────────────────────────────────────
  deploy-pwa:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Prepare PWA
        run: |
          mkdir -p _site
          cp frontend/* _site/
          cp -r frontend/icons _site/ || mkdir -p _site/icons
      
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
