[pytest]
# ============================================================================
# Pytest Configuration for RealEstate_CRM
# ============================================================================
# Run with: pytest
# Run with coverage: pytest --cov
# Run specific test: pytest tests/test_auth_core.py
# Run with verbose: pytest -v
# Run with short tracebacks: pytest --tb=short

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for selective test execution
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    security: marks tests as security-related
    database: marks tests as database-related
    ui: marks tests as UI/widget-related
